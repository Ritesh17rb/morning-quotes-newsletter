name: Send morning quote

on:
  schedule:
    # 02:00 UTC = 7:30 AM IST. GitHub cron is UTC and can run a few
    # minutes late during peak hours — fine for a morning newsletter.
    - cron: "0 2 * * *"
  workflow_dispatch: # allows manual "Run workflow" button for testing

permissions:
  contents: write # to commit the updated quote history back

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and send today's quote
        run: node scripts/send-quote.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL || 'Morning Quotes <onboarding@resend.dev>' }}

      - name: Commit quote history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quotes-history.json
          git diff --cached --quiet || git commit -m "chore: record quote for $(date -u +%F)"
          git push
